<!DOCTYPE html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      line-height: 1.6;
      color: #222;
      background: #f5f5f5;
      padding: 40px;
    }
    .letterhead {
      max-width: 800px;
      margin: 0 auto;

    .logo {

    }

    }
    .divider {

      margin: 40px 0;
    }
    .content {
      min-height: 400px;
    }
    .footer {
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid #ddd;
      font-size: 12px;
      color: #888;
    }
    .footer-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .contact-item a {
      color: #264d26;
      text-decoration: none;
    }
  </style>
</head>
